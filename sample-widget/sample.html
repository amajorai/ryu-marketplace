<!--
  Sample Widget UI — a minimal self-contained skybridge widget (TEMPLATE)
  ---------------------------------------------------------------------------
  This ONE document is what Core serves from `resources/read` and ships inline
  into a null-origin `sandbox="allow-scripts"` iframe (srcdoc). Constraints you
  MUST respect (the host CSP is hard-pinned and never widened):
    - No external <script src>, no CDN, no <link rel=stylesheet>. Inline only.
    - connect-src is 'none' — you CANNOT fetch/XHR/WebSocket. All live data
      arrives via the bridge (window.openai / window.ryu), never the network.
    - Inline <style> is allowed; data: images/fonts are allowed.
  A trusted bootstrap installs window.ryu (alias window.openai) SYNCHRONOUSLY
  before this module runs, so top-level reads of toolOutput/theme/etc. work.
-->
<style>
	:root {
		color-scheme: light dark;
		--bg: #ffffff;
		--fg: #1a1a1a;
		--muted: #6b7280;
		--border: #e5e7eb;
		--accent: #4f46e5;
		--accent-fg: #ffffff;
	}
	/* The host pushes a `theme` global ("light"|"dark"); we mirror it onto the
	   root as data-theme (see the module below) and also honour the OS setting. */
	:root[data-theme="dark"],
	body[data-theme="dark"] {
		--bg: #0f1115;
		--fg: #f3f4f6;
		--muted: #9ca3af;
		--border: #262b36;
		--accent: #818cf8;
		--accent-fg: #0f1115;
	}
	* {
		box-sizing: border-box;
	}
	body {
		margin: 0;
		font-family:
			system-ui,
			-apple-system,
			"Segoe UI",
			sans-serif;
		background: var(--bg);
		color: var(--fg);
	}
	.card {
		padding: 16px 18px;
		display: flex;
		flex-direction: column;
		gap: 12px;
	}
	.greeting {
		font-size: 18px;
		font-weight: 600;
		margin: 0;
	}
	.meta {
		font-size: 12px;
		color: var(--muted);
		margin: 0;
	}
	.counter-row {
		display: flex;
		align-items: center;
		gap: 12px;
	}
	.count {
		font-variant-numeric: tabular-nums;
		font-size: 28px;
		font-weight: 700;
		min-width: 2ch;
		text-align: center;
	}
	button {
		font: inherit;
		cursor: pointer;
		border: 1px solid var(--border);
		background: transparent;
		color: var(--fg);
		border-radius: 8px;
		padding: 8px 12px;
		transition: background 0.12s ease;
	}
	button:hover {
		background: color-mix(in srgb, var(--fg) 8%, transparent);
	}
	button.primary {
		background: var(--accent);
		color: var(--accent-fg);
		border-color: transparent;
	}
	.actions {
		display: flex;
		flex-wrap: wrap;
		gap: 8px;
	}
</style>

<div class="card">
	<p class="greeting" id="greeting">Loading…</p>
	<div class="counter-row">
		<button id="dec" aria-label="Decrement">−</button>
		<span class="count" id="count">0</span>
		<button id="inc" aria-label="Increment">+</button>
	</div>
	<div class="actions">
		<button id="refresh" class="primary">Refresh from server</button>
	</div>
	<p class="meta" id="meta"></p>
</div>

<script type="module">
	// The bridge is present synchronously as window.ryu (alias window.openai).
	// We read from `ryu`; the alias means an unmodified ChatGPT-Apps-SDK widget
	// that reads window.openai also works verbatim.
	const bridge = window.ryu ?? window.openai;

	const $ = (id) => document.getElementById(id);

	// ── 1. READ the tool output (the #1 thing every widget does) ──────────────
	// structuredContent from the render tool arrives here. widgetState is our own
	// persisted UI state (survives reload, keyed by toolCallId) — prefer it for
	// the live counter so a reload restores what the user did.
	function currentCount() {
		const fromState = bridge?.widgetState?.count;
		if (typeof fromState === "number") return fromState;
		const fromOutput = bridge?.toolOutput?.counter;
		return typeof fromOutput === "number" ? fromOutput : 0;
	}

	function applyTheme() {
		const theme = bridge?.theme === "dark" ? "dark" : "light";
		document.documentElement.setAttribute("data-theme", theme);
	}

	function render() {
		applyTheme();
		const out = bridge?.toolOutput ?? {};
		$("greeting").textContent = out.greeting ?? "Hello!";
		$("count").textContent = String(currentCount());
		$("meta").textContent = out.renderedAt
			? `Rendered by server at ${out.renderedAt}`
			: "";
		// Tell the host our natural height so the inline box sizes to content
		// (capped by maxHeight). Call this after any layout change.
		bridge?.notifyIntrinsicHeight?.(document.body.scrollHeight);
	}

	// ── 2. PERSIST UI state via setWidgetState (no extra grant needed) ─────────
	// This is the guaranteed-working interaction: setWidgetState needs no
	// provenance and always works. It updates the client store AND best-effort
	// POSTs so the value survives a reload.
	function setCount(next) {
		const count = Math.max(0, next);
		bridge?.setWidgetState?.({ ...(bridge.widgetState ?? {}), count });
		$("count").textContent = String(count);
		bridge?.notifyIntrinsicHeight?.(document.body.scrollHeight);
	}

	$("inc").addEventListener("click", () => setCount(currentCount() + 1));
	$("dec").addEventListener("click", () => setCount(currentCount() - 1));

	// ── 3. (ADVANCED) callTool — a companion round-trip back to the server ─────
	// Only works because the render tool declares `openai/widgetAccessible: true`
	// in its _meta AND we call a tool on the SAME server that is widget-accessible
	// (here `render` itself). If the experimental runtime is off or provenance
	// fails, callTool rejects — we degrade gracefully rather than break the UI.
	$("refresh").addEventListener("click", async () => {
		try {
			const result = await bridge?.callTool?.("render", {
				name: bridge?.toolInput?.name ?? "world",
			});
			// callTool returns the tool result; the host ALSO refreshes toolOutput,
			// but we read the fresh structuredContent directly to update the label.
			const fresh = result?.structuredContent;
			if (fresh?.renderedAt) {
				$("meta").textContent = `Refreshed at ${fresh.renderedAt}`;
			}
		} catch {
			$("meta").textContent =
				"Refresh unavailable (needs widgetAccessible + live session).";
		}
	});

	// ── 4. React to host-pushed global updates (theme, toolOutput, …) ─────────
	// The host re-dispatches updates as window events on both names.
	for (const evt of ["openai:set_globals", "ryu:set_globals"]) {
		window.addEventListener(evt, render);
	}

	// First paint.
	render();
</script>
